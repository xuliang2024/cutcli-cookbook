name: Case request / 案例需求
description: Suggest a cutcli example you'd like to see / 你想看到一个什么样的 cutcli 案例
title: "[Case Request] "
labels: ["case-request", "good-first-issue"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest an example you'd like added to the cookbook. The community / maintainers pick them up by demand.
        提出一个你希望被加入 cookbook 的案例。社区 / 维护者会按热度认领。
  - type: input
    id: title
    attributes:
      label: Case name / 案例名称
      placeholder: Douyin-style keyword-highlight captions
    validations:
      required: true
  - type: textarea
    id: scene
    attributes:
      label: When to use / 适用场景
      placeholder: One sentence — who uses it and where. / 用一句话说清楚谁会用、用在哪里。
    validations:
      required: true
  - type: textarea
    id: effect
    attributes:
      label: Desired effect (paste reference video / screenshots) / 期望效果（可贴参考视频/截图链接）
    validations:
      required: true
  - type: textarea
    id: cutcli-features
    attributes:
      label: cutcli features involved (multi-select) / 涉及的 cutcli 能力（可多选）
      description: e.g. captions / images / videos / effects / filters / keyframes / masks / stickers / transitions
  - type: input
    id: priority-vote
    attributes:
      label: Priority (optional) / 紧迫度（可选）
      description: 1-5; 5 = need it ASAP, 1 = nice to have / 1-5，5 = 我急需，1 = 锦上添花
      placeholder: "3"
